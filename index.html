<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxie Fractions - Edition PC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050a14;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas { display: block; }
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        .font-space { font-family: 'Orbitron', sans-serif; }
        .hud-top {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 20px; display: flex; justify-content: space-between; align-items: flex-start;
        }
        .score-box {
            background: rgba(0,0,0,0.7); padding: 10px 25px; border-radius: 20px;
            color: white; font-size: 1.5rem; font-weight: bold; border: 2px solid #3b82f6;
            font-family: 'Orbitron', sans-serif;
        }
        .lives-box {
            display: flex; gap: 10px; font-size: 42px;
            background: rgba(0,0,0,0.5); padding: 5px 25px; border-radius: 25px;
        }
        .hidden { display: none !important; }
        kbd {
            background: #2d3748; border: 1px solid #4a5568; border-radius: 4px;
            padding: 2px 6px; font-size: 0.8em; color: #e2e8f0;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="hud-top">
            <div class="score-box">Score : <span id="score-display">0</span></div>
            <div id="questionDisplay" class="hidden text-white text-3xl font-bold bg-blue-900 bg-opacity-90 px-8 py-4 rounded-2xl border-4 border-blue-400 text-center shadow-[0_0_20px_rgba(59,130,246,0.8)] font-space">
                Trouve : <span id="question-text" class="text-yellow-300"></span>
            </div>
            <div class="lives-box" id="lives-display"></div>
        </div>

        <div id="timerContainer" class="hidden absolute top-28 left-1/2 transform -translate-x-1/2 w-1/3 max-w-md bg-gray-800 rounded-full h-6 border-2 border-gray-600">
            <div id="timerBar" class="bg-gradient-to-r from-green-400 to-green-600 h-full rounded-full" style="width: 100%;"></div>
        </div>

        <div id="pcControls" class="hidden absolute bottom-12 right-12 pointer-events-auto">
            <button id="btn-shoot" class="bg-red-600 bg-opacity-80 hover:bg-opacity-100 border-4 border-red-400 text-white w-28 h-28 rounded-full text-2xl font-bold font-space shadow-2xl transition-all">TIR</button>
        </div>

        <div id="overlay" class="absolute inset-0 bg-black bg-opacity-85 flex flex-col items-center justify-center pointer-events-auto backdrop-blur-md">
            <h1 class="text-6xl md:text-8xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-400 to-blue-600 mb-8 text-center font-space">GALAXIE FRACTIONS</h1>
            <h2 id="overlay-title" class="text-4xl text-white font-bold mb-6 text-center font-space">MISSION : CE1</h2>
            
            <div id="overlay-msg" class="text-xl text-blue-200 mb-10 text-center px-6 max-w-3xl leading-relaxed">
                Utilise les flèches du clavier pour piloter.<br>
                Appuie sur <kbd>Espace</kbd> pour tirer.<br><br>
                <span class="text-yellow-300 font-bold">Objectif :</span> Collecte la fraction demandée !<br>
                <span class="text-pink-400">Astuce : Attrape les cœurs ❤️ pour regagner des vies !</span>
            </div>

            <div class="flex flex-col md:flex-row gap-8">
                <button id="btn-lvl1" class="px-16 py-5 bg-blue-600 text-white font-bold rounded-full text-3xl shadow-xl hover:bg-blue-700 transition-all border-b-8 border-blue-900 font-space active:border-b-2 active:translate-y-1">Niveau 1</button>
                <button id="btn-lvl2" class="px-16 py-5 bg-purple-600 text-white font-bold rounded-full text-3xl shadow-xl hover:bg-purple-700 transition-all border-b-8 border-purple-900 font-space active:border-b-2 active:translate-y-1">Niveau 2</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Assets Images
        const images = {};
        const assetList = {
            player: 'playerShip2_blue.png',
            laserBlue: 'laserBlue13.png',
            laserRed: 'laserRed13.png',
            enemy1: 'enemyBlack1.png',
            enemy2: 'enemyBlack2.png',
            enemy3: 'enemyBlack3.png',
            enemy4: 'enemyBlack4.png',
            enemy5: 'enemyBlack5.png',
            meteor1: 'meteorBrown_big1.png',
            meteor2: 'meteorBrown_big2.png',
            meteor3: 'meteorBrown_big3.png'
        };

        Object.keys(assetList).forEach(key => {
            images[key] = new Image();
            images[key].src = assetList[key];
        });

        let score = 0, lives = 3, gameTimeTotal = 120, gameTimeLeft = 120;
        let lastTime = 0, gameState = 'START'; 
        
        const overlay = document.getElementById('overlay');
        const questionDisplay = document.getElementById('questionDisplay');
        const timerContainer = document.getElementById('timerContainer');
        const timerBar = document.getElementById('timerBar');
        const scoreDisplay = document.getElementById('score-display');
        const questionText = document.getElementById('question-text');

        let player = { x: 0, y: 0, w: 60, h: 60, speed: 7, invulnerableTimer: 0 };
        let projectiles = [], asteroids = [], fractions = [], enemies = [], enemyLasers = [], particles = [], stars = [], scorePopups = [], bonuses = [];
        let feedbackTimer = 0, feedbackText = "", feedbackCorrectObj = null;
        let currentQuestionType = 'circle';

        const slotColors = [
            { main: '#3b82f6', bg: 'rgba(59, 130, 246, 0.2)' }, 
            { main: '#22c55e', bg: 'rgba(34, 197, 94, 0.2)' },  
            { main: '#eab308', bg: 'rgba(234, 179, 8, 0.2)' },  
            { main: '#ef4444', bg: 'rgba(239, 68, 68, 0.2)' }   
        ];

        const fractionsLvl1 = [
            { t: "Un Demi", n: 1, d: 2, v: 0.5 },
            { t: "Un Tiers", n: 1, d: 3, v: 1/3 }, { t: "Deux Tiers", n: 2, d: 3, v: 2/3 },
            { t: "Un Quart", n: 1, d: 4, v: 0.25 }, { t: "Deux Quarts", n: 2, d: 4, v: 0.5 }, { t: "Trois Quarts", n: 3, d: 4, v: 0.75 }
        ];
        const fractionsLvl2 = [
            ...fractionsLvl1,
            { t: "Un Cinquième", n: 1, d: 5, v: 0.2 }, { t: "Deux Cinquièmes", n: 2, d: 5, v: 0.4 }, { t: "Trois Cinquièmes", n: 3, d: 5, v: 0.6 }, { t: "Quatre Cinquièmes", n: 4, d: 5, v: 0.8 },
            { t: "Un Sixième", n: 1, d: 6, v: 1/6 }, { t: "Deux Sixièmes", n: 2, d: 6, v: 2/6 }, { t: "Trois Sixièmes", n: 3, d: 6, v: 3/6 }, { t: "Quatre Sixièmes", n: 4, d: 6, v: 4/6 }, { t: "Cinq Sixièmes", n: 5, d: 6, v: 5/6 }
        ];
        
        let currentPool = fractionsLvl1, targetFraction = null;
        let keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false, Space: false };

        window.onkeydown = (e) => { keys[e.code] = true; if(e.code === 'Space') shoot(); };
        window.onkeyup = (e) => { keys[e.code] = false; };
        document.getElementById('btn-shoot').onmousedown = (e) => { e.preventDefault(); shoot(); };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (gameState === 'START') player.y = canvas.height - 120;
        }
        window.onresize = resize;
        resize();

        function initStars() {
            stars = [];
            for(let i=0; i<100; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 2, sp: Math.random() * 2 + 0.5 });
            }
        }
        initStars();

        function generateQuestion() {
            targetFraction = currentPool[Math.floor(Math.random() * currentPool.length)];
            questionText.innerText = Math.random() > 0.5 ? targetFraction.t : targetFraction.n + " / " + targetFraction.d;
        }

        function createScorePopup(x, y, text, color = "#4ade80") {
            scorePopups.push({ x, y: y - 20, text: text, color, life: 70 });
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<15; i++) particles.push({ x, y, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8, l:1, c:color });
        }

        function hitPlayer() {
            lives--; updateLivesUI();
            player.invulnerableTimer = 80;
            createExplosion(player.x+player.w/2, player.y+player.h/2, '#ef4444');
            createScorePopup(player.x + player.w/2, player.y, "-1 Vie !", "#ef4444");
            if (lives <= 0) endGame("MISSION ÉCHOUÉE");
        }

        function shoot() {
            if (gameState !== 'PLAYING') return;
            projectiles.push({ x: player.x + player.w/2 - 4, y: player.y, w: 9, h: 26, sp: 12 });
        }

        function updateLivesUI() { 
            const display = document.getElementById('lives-display');
            display.innerHTML = '❤️'.repeat(lives); 
        }

        function update(currentTime) {
            stars.forEach(s => { s.y += s.sp; if(s.y > canvas.height) s.y = -10; });

            if (gameState === 'START' || gameState === 'GAMEOVER') return;

            if (gameState === 'PLAYING') {
                if (!lastTime) lastTime = currentTime;
                gameTimeLeft -= (currentTime - lastTime) / 1000;
                lastTime = currentTime;
                timerBar.style.width = Math.max(0, (gameTimeLeft / gameTimeTotal) * 100) + '%';
                if (gameTimeLeft <= 0) return endGame("TEMPS ÉCOULÉ");
            }

            if (gameState === 'CORRECTION') {
                lastTime = currentTime;
                feedbackTimer--;
                if (feedbackTimer <= 0) { gameState = 'PLAYING'; generateQuestion(); spawnObjects(); }
                return;
            }

            // Mouvement Joueur
            if (keys.ArrowLeft) player.x -= player.speed; if (keys.ArrowRight) player.x += player.speed;
            if (keys.ArrowUp) player.y -= player.speed; if (keys.ArrowDown) player.y += player.speed;
            player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));
            if (player.invulnerableTimer > 0) player.invulnerableTimer--;

            spawnHazards();

            projectiles.forEach((p, i) => { p.y -= p.sp; if (p.y < 0) projectiles.splice(i, 1); });
            scorePopups.forEach((p, i) => { p.y -= 0.8; p.life--; if(p.life <= 0) scorePopups.splice(i, 1); });

            // Astéroïdes
            asteroids.forEach((a, i) => {
                a.y += a.sp; a.rot += a.rotSp;
                if (checkCollision(player, a) && player.invulnerableTimer <= 0) { hitPlayer(); asteroids.splice(i, 1); }
                projectiles.forEach((p, pi) => {
                    if (checkCollision(p, a)) {
                        createExplosion(a.x+a.w/2, a.y+a.h/2, '#7c2d12');
                        score += 10; scoreDisplay.innerText = score;
                        createScorePopup(a.x + a.w/2, a.y, "+10", "#4ade80");
                        asteroids.splice(i, 1); projectiles.splice(pi, 1);
                    }
                });
                if (a.y > canvas.height) asteroids.splice(i, 1);
            });

            // Ennemis
            enemies.forEach((e, i) => {
                e.y += e.sp; e.timeCounter += 0.02;
                e.x = e.centerX + Math.sin(e.timeCounter * e.freq) * e.amp;
                if (e.canShoot && Math.random() < 0.008) enemyLasers.push({ x: e.x + e.w/2 - 4, y: e.y + e.h, w: 9, h: 26, sp: 5 });
                if (checkCollision(player, e) && player.invulnerableTimer <= 0) { hitPlayer(); enemies.splice(i, 1); }
                projectiles.forEach((p, pi) => {
                    if (checkCollision(p, e)) {
                        createExplosion(e.x+e.w/2, e.y+e.h/2, '#ef4444');
                        score += 30; scoreDisplay.innerText = score;
                        createScorePopup(e.x + e.w/2, e.y, "+30", "#4ade80");
                        enemies.splice(i, 1); projectiles.splice(pi, 1);
                    }
                });
                if (e.y > canvas.height) enemies.splice(i, 1);
            });

            // Bonus Coeur
            bonuses.forEach((b, i) => {
                b.y += 1.5;
                if (checkCollision(player, b)) {
                    if (lives < 5) { lives++; updateLivesUI(); createScorePopup(player.x + player.w/2, player.y, "+1 ❤️", "#ff69b4"); }
                    else { score += 50; scoreDisplay.innerText = score; createScorePopup(player.x + player.w/2, player.y, "+50 Bonus", "#ff69b4"); }
                    bonuses.splice(i, 1);
                }
                if (b.y > canvas.height) bonuses.splice(i, 1);
            });

            enemyLasers.forEach((l, i) => {
                l.y += l.sp;
                if (checkCollision(l, player) && player.invulnerableTimer <= 0) { hitPlayer(); enemyLasers.splice(i, 1); }
                if (l.y > canvas.height) enemyLasers.splice(i, 1);
            });

            // Fractions et détection d'oubli
            let anyFractionVisible = false;
            fractions.forEach((f, i) => {
                f.y += 1.0; 
                if (f.y < canvas.height) anyFractionVisible = true;

                if (checkCollision(player, f)) {
                    if (f.correct) {
                        createExplosion(f.x+f.w/2, f.y+f.h/2, '#22c55e');
                        score += 100; scoreDisplay.innerText = score;
                        createScorePopup(player.x+player.w/2, player.y, "+100", "#4ade80");
                        generateQuestion(); spawnObjects();
                    } else {
                        triggerCorrection("Oups ! Mauvaise réponse.");
                    }
                }
            });

            if (!anyFractionVisible && fractions.length > 0) {
                triggerCorrection("Tu as laissé passer la réponse !");
                score = Math.max(0, score - 100); // Pénalité pour oubli
                scoreDisplay.innerText = score;
            }

            particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.l -= 0.02; if(p.l <= 0) particles.splice(i, 1); });
        }

        function spawnHazards() {
            // Réduction des astéroïdes : probabilité diminuée de 0.012 à 0.005
            if (Math.random() < 0.005) {
                const size = 30 + Math.random() * 50;
                asteroids.push({
                    x: Math.random() * (canvas.width - size), y: -size,
                    w: size, h: size, sp: 1 + Math.random() * 2,
                    rot: 0, rotSp: (Math.random() - 0.5) * 0.05,
                    img: images['meteor' + (Math.floor(Math.random() * 3) + 1)]
                });
            }
            if (Math.random() < 0.005) {
                let startX = Math.random() * (canvas.width - 60);
                if (Math.random() < 0.2) bonuses.push({ x: startX, y: -50, w: 40, h: 40 });
                else enemies.push({
                    centerX: startX, x: startX, y: -60, w: 60, h: 50, 
                    sp: 1 + Math.random() * 1.5, timeCounter: 0, amp: 30 + Math.random() * 100,
                    freq: 1 + Math.random() * 2, canShoot: Math.random() > 0.4,
                    img: images['enemy' + (Math.floor(Math.random() * 5) + 1)]
                });
            }
        }

        function spawnObjects() {
            fractions = [];
            const positions = [0.15, 0.40, 0.65, 0.90];
            const correctIdx = Math.floor(Math.random() * 4);
            currentQuestionType = Math.random() > 0.5 ? 'circle' : 'rect';
            let usedValues = [targetFraction.v];

            positions.forEach((p, i) => {
                let frac;
                if (i === correctIdx) { frac = { ...targetFraction, correct: true }; }
                else {
                    let attempts = 0;
                    do { frac = currentPool[Math.floor(Math.random() * currentPool.length)]; attempts++; }
                    while (usedValues.includes(frac.v) && attempts < 20);
                    frac = { ...frac, correct: false };
                    usedValues.push(frac.v);
                }
                fractions.push({ 
                    x: (p * canvas.width) - 60, y: -150, w: 120, h: 120, 
                    n: frac.n, d: frac.d, correct: frac.correct,
                    type: currentQuestionType, colorData: slotColors[i]
                });
            });
        }

        function triggerCorrection(msg) {
            feedbackText = msg;
            feedbackTimer = 180;
            feedbackCorrectObj = { n: targetFraction.n, d: targetFraction.d, type: currentQuestionType };
            gameState = 'CORRECTION';
            score = Math.max(0, score - 50);
            scoreDisplay.innerText = score;
            fractions = [];
        }

        function checkCollision(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

        function draw() {
            ctx.fillStyle = '#050a14'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => { ctx.globalAlpha = 0.5; ctx.fillStyle = 'white'; ctx.fillRect(s.x, s.y, s.s, s.s); });
            ctx.globalAlpha = 1.0;

            if (gameState === 'START' || gameState === 'GAMEOVER') return;

            asteroids.forEach(a => {
                ctx.save(); ctx.translate(a.x + a.w/2, a.y + a.h/2); ctx.rotate(a.rot);
                ctx.drawImage(a.img, -a.w/2, -a.h/2, a.w, a.h); ctx.restore();
            });

            enemies.forEach(e => ctx.drawImage(e.img, e.x, e.y, e.w, e.h));
            projectiles.forEach(p => ctx.drawImage(images.laserBlue, p.x, p.y, p.w, p.h));
            enemyLasers.forEach(l => ctx.drawImage(images.laserRed, l.x, l.y, l.w, l.h));

            bonuses.forEach(b => {
                ctx.font = "40px Arial"; ctx.textAlign = "center";
                ctx.fillText("❤️", b.x + 20, b.y + 35);
            });

            fractions.forEach(f => {
                ctx.fillStyle = f.colorData.bg; ctx.fillRect(f.x, f.y, f.w, f.h);
                ctx.strokeStyle = f.colorData.main; ctx.lineWidth = 3; ctx.strokeRect(f.x, f.y, f.w, f.h);
                if (f.type === 'circle') drawFractionCircle(f.x + f.w/2, f.y + f.h/2, f.n, f.d, f.colorData.main, 45);
                else drawFractionRect(f.x + 15, f.y + 15, f.w - 30, f.h - 30, f.n, f.d, f.colorData.main);
            });

            if (player.invulnerableTimer % 10 < 5) ctx.drawImage(images.player, player.x, player.y, player.w, player.h);

            scorePopups.forEach(p => {
                ctx.fillStyle = p.color; ctx.font = 'bold 32px Orbitron'; ctx.textAlign = 'center';
                ctx.fillText(p.text, p.x, p.y);
            });

            particles.forEach(p => { ctx.globalAlpha = p.l; ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, 4, 4); });
            ctx.globalAlpha = 1.0;

            if (gameState === 'CORRECTION') {
                ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = 'white'; ctx.font = '32px Orbitron'; ctx.textAlign = 'center';
                ctx.fillText(feedbackText, canvas.width/2, canvas.height/2 - 180);
                
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const blueColor = '#3b82f6';

                if (feedbackCorrectObj.type === 'circle') {
                    drawFractionCircle(centerX, centerY, feedbackCorrectObj.n, feedbackCorrectObj.d, blueColor, 100, true);
                } else {
                    const rectW = 250; const rectH = 100;
                    drawFractionRect(centerX - rectW/2, centerY - rectH/2, rectW, rectH, feedbackCorrectObj.n, feedbackCorrectObj.d, blueColor, true);
                }
                
                ctx.fillStyle = '#facc15'; ctx.font = 'bold 44px Orbitron';
                ctx.fillText(`${feedbackCorrectObj.n} / ${feedbackCorrectObj.d}`, centerX, centerY + 180);
            }
        }

        function drawFractionCircle(x, y, n, d, color, size = 35, isFeedback = false) {
            ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = isFeedback ? 5 : 2;
            ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.stroke();
            const angle = (Math.PI*2)/d;
            for(let i=0; i<d; i++) {
                const s = i*angle - Math.PI/2, e = (i+1)*angle - Math.PI/2;
                if(i < n) { ctx.fillStyle = color; ctx.beginPath(); ctx.moveTo(x,y); ctx.arc(x,y,size,s,e); ctx.fill(); }
                ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x + Math.cos(s)*size, y + Math.sin(s)*size); ctx.stroke();
            }
        }

        function drawFractionRect(x, y, w, h, n, d, color, isFeedback = false) {
            ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth = isFeedback ? 5 : 2;
            ctx.strokeRect(x, y, w, h);
            const step = w / d;
            for(let i=0; i<d; i++) {
                if(i < n) { ctx.fillStyle = color; ctx.fillRect(x + i*step, y, step, h); }
                ctx.beginPath(); ctx.moveTo(x + i*step, y); ctx.lineTo(x + i*step, y + h); ctx.stroke();
            }
        }

        function gameLoop(t) { update(t); draw(); requestAnimationFrame(gameLoop); }

        function startGame(lvl) {
            score = 0; lives = 3; gameTimeLeft = gameTimeTotal; lastTime = 0;
            currentPool = lvl === 1 ? fractionsLvl1 : fractionsLvl2;
            scoreDisplay.innerText = "0"; updateLivesUI();
            player.x = canvas.width/2 - 30; player.y = canvas.height - 120;
            asteroids = []; enemies = []; enemyLasers = []; projectiles = []; fractions = []; scorePopups = []; bonuses = [];
            gameState = 'PLAYING';
            overlay.classList.add('hidden'); questionDisplay.classList.remove('hidden');
            timerContainer.classList.remove('hidden'); document.getElementById('pcControls').classList.remove('hidden');
            generateQuestion(); spawnObjects();
        }

        function endGame(reason) {
            gameState = 'GAMEOVER';
            document.getElementById('overlay-title').innerText = reason;
            document.getElementById('overlay-msg').innerHTML = `Score Final : ${score}`;
            overlay.classList.remove('hidden'); questionDisplay.classList.add('hidden');
            timerContainer.classList.add('hidden'); document.getElementById('pcControls').classList.add('hidden');
        }

        document.getElementById('btn-lvl1').onclick = () => startGame(1);
        document.getElementById('btn-lvl2').onclick = () => startGame(2);
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
</html>
